site_name: douglasebhoman.com — Site Documentation

site_url: https://douglasebhoman.com/site-docs/

site_author: Douglas Ebhoman

site_description: Technical documentation for douglasebhoman.com — architecture, local setup, deployment, and contributing guidelines.

repo_name: Douglasebhoman/douglasebhoman.github.io

repo_url: https://github.com/Douglasebhoman/douglasebhoman.github.io

theme:
  name: material
  logo: assets/logo.svg
  homepage: https://douglasebhoman.com
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: false
    code: false
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Overview: overview.md
  - Architecture: architecture.md
  - JavaScript: javascript.md
  - Local Setup: local-setup.md
  - Deployment: deployment.md
  - Content Guide: content-guide.md
  - Contributing: contributing.md

extra_css:
  - stylesheets/brand.css

extra:
  social:
    - icon: fontawesome/solid/house
      link: https://douglasebhoman.com
      name: douglasebhoman.com

copyright: '© 2026 Douglas Ebhoman · <a href="https://douglasebhoman.com">douglasebhoman.com</a>'

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - tables